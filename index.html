<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비에프에스 업무현황</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{
    --canvas:#F4F5F8; --surface:#FFFFFF; --ink:#16202E; --muted:#6B7688; --faint:#9AA3B2;
    --border:#E7EAF0; --border-strong:#D7DBE4; --brand:#4338CA; --brand-soft:#EEEDFB;
    --st-wait:#94A3B8; --st-prog:#2563EB; --st-hold:#D97706; --st-done:#16A34A;
    --pri-high:#DC2626; --pri-mid:#D97706; --pri-low:#64748B;
    --shadow:0 1px 2px rgba(16,32,46,.05), 0 4px 16px rgba(16,32,46,.04);
    --shadow-lift:0 8px 30px rgba(16,32,46,.14); --r:12px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:"Pretendard","Pretendard Variable",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","Segoe UI",Roboto,sans-serif;
    background:var(--canvas);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;}

  .app{display:grid;grid-template-columns:236px 1fr;min-height:100vh;}
  .sidebar{background:#0F1623;color:#C7CEDA;padding:22px 16px;display:flex;flex-direction:column;gap:4px;position:sticky;top:0;height:100vh;}
  .brand{display:flex;align-items:center;gap:10px;padding:4px 8px 20px;}
  .brand-mark{width:30px;height:30px;border-radius:8px;background:linear-gradient(140deg,#6366F1,#4338CA);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px;flex-shrink:0;}
  .brand-name{font-weight:700;color:#fff;font-size:14.5px;letter-spacing:-.01em;}
  .brand-sub{font-size:11px;color:#7C879A;font-weight:500;margin-top:1px;}
  .nav-label{font-size:11px;color:#5C6678;font-weight:600;text-transform:uppercase;letter-spacing:.06em;padding:14px 8px 6px;}
  .nav-btn{display:flex;align-items:center;gap:11px;width:100%;border:none;background:transparent;color:#C7CEDA;padding:9px 10px;border-radius:9px;font-size:14px;font-weight:500;text-align:left;transition:.15s;}
  .nav-btn svg{width:18px;height:18px;flex-shrink:0;opacity:.85;}
  .nav-btn:hover{background:#1B2435;color:#fff;}
  .nav-btn.active{background:#4338CA;color:#fff;}
  .nav-btn.active svg{opacity:1;}
  .nav-count{margin-left:auto;font-size:12px;font-weight:600;background:rgba(255,255,255,.12);padding:1px 8px;border-radius:20px;color:#E7EAF0;}
  .nav-btn.active .nav-count{background:rgba(255,255,255,.22);}
  .side-foot{margin-top:auto;padding:8px;}
  .side-foot button{background:transparent;border:none;color:#6B7688;font-size:12px;padding:6px;}
  .side-foot button:hover{color:#C7CEDA;}

  .main{min-width:0;display:flex;flex-direction:column;}
  .topbar{display:flex;align-items:center;gap:16px;padding:20px 30px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:20;}
  .topbar h1{font-size:20px;margin:0;font-weight:700;letter-spacing:-.02em;}
  .topbar .sub{color:var(--muted);font-size:13px;margin-top:2px;}
  .btn{border:1px solid var(--border-strong);background:var(--surface);color:var(--ink);padding:9px 14px;border-radius:9px;font-size:13.5px;font-weight:600;transition:.15s;display:inline-flex;align-items:center;gap:7px;}
  .btn:hover{background:#F8F9FB;border-color:#C3C9D4;}
  .btn.primary{background:var(--brand);border-color:var(--brand);color:#fff;}
  .btn.primary:hover{background:#3A2FB8;}
  .btn.danger{background:var(--pri-high);border-color:var(--pri-high);color:#fff;}
  .btn.danger:hover{background:#B91C1C;}
  .btn.sm{padding:7px 12px;font-size:13px;}
  .btn svg{width:16px;height:16px;}
  .content{padding:26px 30px 60px;}

  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 18px 16px;box-shadow:var(--shadow);}
  .stat .num{font-size:30px;font-weight:800;letter-spacing:-.03em;line-height:1;}
  .stat .lbl{font-size:13px;color:var(--muted);margin-top:8px;font-weight:500;display:flex;align-items:center;gap:6px;}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:20px;}
  .panel-head{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
  .panel-head h2{font-size:15px;margin:0;font-weight:700;}
  .panel-head .hint{font-size:12px;color:var(--faint);margin-left:auto;font-weight:500;}
  .panel-body{padding:8px 20px 18px;}
  .avatar{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;flex-shrink:0;}
  .load-role{font-size:12px;color:var(--faint);font-weight:500;}

  .duelist{display:flex;flex-direction:column;}
  .due-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid #F1F2F6;}
  .due-row:last-child{border-bottom:none;}
  .due-title{font-weight:600;font-size:14px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .due-when{font-size:12.5px;font-weight:600;white-space:nowrap;}
  .due-when.over{color:var(--pri-high);} .due-when.soon{color:var(--st-hold);}
  .empty-soft{color:var(--faint);font-size:13.5px;padding:18px 0;text-align:center;}

  .pp-row{display:flex;align-items:center;gap:13px;padding:11px 0;border-bottom:1px solid #F1F2F6;cursor:pointer;}
  .pp-row:last-child{border-bottom:none;}
  .pp-row:hover .pp-name{color:var(--brand);}
  .pp-chip{width:11px;height:11px;border-radius:4px;flex-shrink:0;}
  .pp-name{font-weight:600;font-size:14px;min-width:130px;transition:.12s;}
  .pp-bar{flex:1;height:9px;background:#EEF0F4;border-radius:20px;overflow:hidden;}
  .pp-fill{height:100%;border-radius:20px;}
  .pp-meta{font-size:12.5px;color:var(--muted);min-width:96px;text-align:right;font-variant-numeric:tabular-nums;}

  /* member manage panel */
  .mm-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid #F1F2F6;}
  .mm-row:last-child{border-bottom:none;}
  .mm-name{font-weight:600;font-size:14px;min-width:104px;max-width:160px;outline:none;padding:4px 7px;border-radius:6px;white-space:pre-wrap;word-break:break-word;}
  .mm-role{font-size:13px;color:var(--muted);flex:1;outline:none;padding:4px 7px;border-radius:6px;white-space:pre-wrap;word-break:break-word;}
  .mm-name:focus,.mm-role:focus{background:#FBFBFE;box-shadow:inset 0 0 0 2px var(--brand-soft);}
  .mm-name:empty:before{content:attr(data-ph);color:var(--faint);}
  .mm-role:empty:before{content:attr(data-ph);color:var(--faint);font-weight:400;}
  .mm-actions{display:flex;align-items:center;gap:1px;}
  .mm-btn{border:none;background:transparent;color:#AEB7C5;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;}
  .mm-btn svg{width:15px;height:15px;}
  .mm-btn:hover{background:#F1F2F6;color:var(--ink);}
  .mm-btn.del:hover{background:#FEECEC;color:var(--pri-high);}
  .mm-btn:disabled{opacity:.28;cursor:default;}
  .mm-btn:disabled:hover{background:transparent;color:#AEB7C5;}

  .filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;align-items:center;}
  .filters .lab{font-size:12.5px;color:var(--muted);font-weight:600;margin-right:2px;}
  .chip{border:1px solid var(--border-strong);background:var(--surface);padding:6px 13px;border-radius:20px;font-size:13px;font-weight:600;color:var(--muted);transition:.12s;}
  .chip:hover{border-color:#BFC5D1;}
  .chip.on{background:var(--ink);border-color:var(--ink);color:#fff;}
  .chip .cdot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle;}

  .board{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;align-items:start;}
  .col{background:#EFF1F5;border-radius:var(--r);padding:12px 10px;min-height:120px;transition:.15s;}
  .col.dragover{background:#E3E6FB;outline:2px dashed var(--brand);outline-offset:-3px;}
  .col-head{display:flex;align-items:center;gap:8px;padding:4px 6px 12px;}
  .col-head .ttl{font-weight:700;font-size:13.5px;}
  .col-head .cnt{font-size:12px;color:var(--muted);font-weight:600;background:#fff;padding:0 8px;border-radius:20px;}
  .col-head .sdot{width:9px;height:9px;border-radius:50%;}
  .add-mini{margin-left:auto;border:none;background:transparent;color:var(--muted);font-size:18px;line-height:1;width:24px;height:24px;border-radius:6px;}
  .add-mini:hover{background:#fff;color:var(--brand);}
  .card{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 13px 12px;margin-bottom:9px;box-shadow:0 1px 2px rgba(16,32,46,.05);cursor:grab;transition:.12s;}
  .card:hover{box-shadow:var(--shadow);transform:translateY(-1px);}
  .card:active{cursor:grabbing;}
  .card.dragging{opacity:.45;}
  .proj-tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;margin-bottom:8px;max-width:100%;overflow:hidden;}
  .proj-tag .pt-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .proj-tag span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .card-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:9px;}
  .card-title{font-weight:600;font-size:14px;line-height:1.35;flex:1;word-break:break-word;}
  .pri-tag{font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px;white-space:nowrap;flex-shrink:0;margin-top:1px;}
  .card-foot{display:flex;align-items:center;gap:8px;}
  .mini-av{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:11px;flex-shrink:0;}
  .card-assignee{font-size:12.5px;color:var(--muted);font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .card-due{font-size:12px;font-weight:600;color:var(--faint);display:flex;align-items:center;gap:4px;white-space:nowrap;}
  .card-due.over{color:var(--pri-high);} .card-due.soon{color:var(--st-hold);}
  .card-del{border:none;background:transparent;color:#C3C9D4;width:20px;height:20px;border-radius:5px;font-size:15px;line-height:1;opacity:0;transition:.12s;flex-shrink:0;}
  .card:hover .card-del{opacity:1;}
  .card-del:hover{background:#FEECEC;color:var(--pri-high);}
  .col-empty{font-size:12.5px;color:var(--faint);text-align:center;padding:14px 0;}

  .proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;}
  .proj-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;cursor:pointer;transition:.14s;}
  .proj-card:hover{box-shadow:var(--shadow-lift);transform:translateY(-2px);}
  .proj-stripe{height:5px;}
  .proj-inner{padding:16px 18px 18px;}
  .proj-card-top{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
  .proj-card-name{font-weight:700;font-size:16px;flex:1;}
  .status-pill{font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;white-space:nowrap;}
  .card-ctrls{display:flex;gap:2px;opacity:0;transition:.12s;flex-shrink:0;}
  .proj-card:hover .card-ctrls{opacity:1;}
  .ctrl-btn{border:none;background:#F1F2F6;color:var(--muted);width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;}
  .ctrl-btn svg{width:14px;height:14px;}
  .ctrl-btn:hover{background:#E5E7EE;color:var(--ink);}
  .ctrl-btn.del:hover{background:#FEECEC;color:var(--pri-high);}
  .proj-desc{font-size:13px;color:var(--muted);margin:6px 0 12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:18px;}
  .proj-progress{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .proj-progress .bar{flex:1;height:8px;background:#EEF0F4;border-radius:20px;overflow:hidden;}
  .proj-progress .fill{height:100%;border-radius:20px;}
  .proj-progress .pct{font-size:12.5px;font-weight:700;color:var(--ink);min-width:34px;text-align:right;}
  .postit{display:block;width:100%;background:#FFF6BF;border:none;border-radius:3px;box-shadow:0 2px 5px rgba(16,32,46,.12);padding:11px 12px;font-size:12.5px;line-height:1.5;color:#5A4B12;resize:none;min-height:62px;margin:2px 0 13px;transform:rotate(-.6deg);font-family:inherit;outline:none;transition:.12s;}
  .postit::placeholder{color:#B9A94E;}
  .postit:focus{transform:rotate(0);box-shadow:0 4px 12px rgba(16,32,46,.18);background:#FFF2A0;}
  .proj-card-foot{display:flex;align-items:center;gap:10px;}
  .av-stack{display:flex;}
  .av-stack .mini-av{margin-left:-6px;border:2px solid var(--surface);}
  .av-stack .mini-av:first-child{margin-left:0;}
  .proj-foot-meta{font-size:12.5px;color:var(--muted);font-weight:500;margin-left:auto;}
  .add-tile{border:1.5px dashed var(--border-strong);background:transparent;border-radius:var(--r);display:flex;align-items:center;justify-content:center;gap:8px;color:var(--muted);font-weight:600;font-size:14px;min-height:210px;transition:.15s;}
  .add-tile:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-soft);}

  .pd-head{display:flex;align-items:center;gap:12px;margin-bottom:6px;flex-wrap:wrap;}
  .back-btn{border:1px solid var(--border-strong);background:var(--surface);border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;color:var(--muted);}
  .back-btn:hover{background:#F8F9FB;color:var(--ink);}
  .pd-title{font-size:20px;font-weight:700;letter-spacing:-.02em;}
  .pd-actions{margin-left:auto;display:flex;gap:8px;}
  .pd-sub{color:var(--muted);font-size:13.5px;margin:2px 0 18px 46px;}
  .pd-cols{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;align-items:start;}

  .roster-intro{font-size:13px;color:var(--muted);margin:-6px 0 16px;}
  .roster-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;}
  .sheet-bar{display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid var(--border);}
  .sheet-bar .bar-actions{margin-left:auto;display:flex;gap:8px;}
  .add-row-btn{border:1px dashed var(--border-strong);background:transparent;color:var(--muted);font-weight:600;font-size:13px;padding:8px 13px;border-radius:9px;display:inline-flex;align-items:center;gap:6px;}
  .add-row-btn:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-soft);}
  .add-row-btn svg{width:14px;height:14px;}
  .roster-scroll{overflow-x:auto;}
  .rtable{border-collapse:collapse;width:max-content;min-width:100%;}
  .rtable th{font-size:12px;font-weight:700;color:var(--muted);text-align:left;padding:9px 12px;background:#F7F8FA;border-bottom:1px solid var(--border);border-right:1px solid #EEF0F4;vertical-align:middle;}
  .rtable th:last-child{border-right:none;}
  .rtable td{border-bottom:1px solid #F1F2F6;border-right:1px solid #F4F5F8;padding:0;vertical-align:top;}
  .rtable td:last-child{border-right:none;}
  .rtable tr:last-child td{border-bottom:none;}
  .rtable th,.rtable td{min-width:170px;}
  .rtable th.col-del,.rtable td.col-del{min-width:46px;width:46px;}
  .th-inner{display:flex;align-items:center;gap:4px;}
  .hcell{flex:1;outline:none;min-width:40px;white-space:pre-wrap;word-break:break-word;cursor:text;padding:3px 5px;border-radius:5px;color:var(--ink);font-weight:700;font-size:12.5px;}
  .hcell:focus{background:#fff;box-shadow:inset 0 0 0 2px var(--brand-soft);}
  .hcell:empty:before{content:attr(data-ph);color:var(--faint);font-weight:500;}
  .coldel{border:none;background:transparent;color:#CBD2DC;width:20px;height:20px;border-radius:5px;font-size:14px;line-height:1;opacity:0;transition:.12s;flex-shrink:0;}
  .rtable th:hover .coldel{opacity:1;}
  .coldel:hover{background:#FEECEC;color:var(--pri-high);}
  .rcell{padding:11px 13px;font-size:13.5px;min-height:46px;outline:none;white-space:pre-wrap;word-break:break-word;line-height:1.55;cursor:text;}
  .rcell:focus{background:#FBFBFE;box-shadow:inset 0 0 0 2px var(--brand-soft);border-radius:4px;}
  .rcell.first{font-weight:700;}
  .rcell:empty:before{content:attr(data-ph);color:var(--faint);pointer-events:none;}
  .delcell{text-align:center;vertical-align:middle;}
  .rdel{border:none;background:transparent;color:var(--faint);width:28px;height:28px;border-radius:6px;font-size:16px;line-height:1;}
  .rdel:hover{background:#FEECEC;color:var(--pri-high);}

  .overlay{position:fixed;inset:0;background:rgba(16,24,38,.42);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;padding:20px;z-index:100;opacity:0;pointer-events:none;transition:.18s;}
  .overlay.show{opacity:1;pointer-events:auto;}
  #confirmOverlay{z-index:140;}
  .modal{background:var(--surface);border-radius:16px;box-shadow:var(--shadow-lift);width:100%;max-width:480px;max-height:90vh;overflow:auto;transform:translateY(8px) scale(.99);transition:.18s;}
  .overlay.show .modal{transform:none;}
  .modal-head{padding:20px 22px 0;display:flex;align-items:center;}
  .modal-head h3{margin:0;font-size:17px;font-weight:700;}
  .modal-head .x{margin-left:auto;border:none;background:#F1F2F6;width:30px;height:30px;border-radius:8px;color:var(--muted);font-size:17px;}
  .modal-head .x:hover{background:#E7E9EF;color:var(--ink);}
  .modal-body{padding:18px 22px 22px;}
  .field{margin-bottom:15px;}
  .field label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:6px;}
  .field input,.field select,.field textarea{width:100%;border:1px solid var(--border-strong);border-radius:9px;padding:10px 12px;font-size:14px;color:var(--ink);background:var(--surface);transition:.12s;}
  .field textarea{resize:vertical;min-height:64px;}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft);}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .assignee-pick{display:flex;flex-wrap:wrap;gap:7px;}
  .apick{border:1px solid var(--border-strong);background:#fff;border-radius:20px;padding:5px 12px 5px 10px;font-size:13px;font-weight:600;color:var(--muted);display:inline-flex;align-items:center;gap:7px;}
  .apick .ad{width:9px;height:9px;border-radius:50%;}
  .apick.on{background:var(--ink);border-color:var(--ink);color:#fff;}
  .apick-empty{font-size:12.5px;color:var(--faint);}
  .seg{display:flex;gap:6px;}
  .seg button{flex:1;border:1px solid var(--border-strong);background:var(--surface);padding:8px;border-radius:8px;font-size:13px;font-weight:600;color:var(--muted);}
  .seg button.on{color:#fff;border-color:transparent;}
  .swatches{display:flex;gap:8px;flex-wrap:wrap;}
  .swatch{width:30px;height:30px;border-radius:8px;border:2px solid transparent;cursor:pointer;transition:.12s;}
  .swatch.on{border-color:var(--ink);transform:scale(1.08);}
  .modal-foot{display:flex;gap:10px;padding-top:6px;align-items:center;}
  .modal-foot .btn{flex:1;justify-content:center;padding:11px;}
  .danger-link{border:none;background:transparent;color:var(--pri-high);font-size:13px;font-weight:600;padding:8px 0;white-space:nowrap;}
  .danger-link:hover{text-decoration:underline;}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 18px;border-radius:10px;font-size:13.5px;font-weight:600;box-shadow:var(--shadow-lift);opacity:0;pointer-events:none;transition:.22s;z-index:200;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .view{display:none;} .view.active{display:block;}

  @media(max-width:1000px){
    .app{grid-template-columns:1fr;}
    .sidebar{position:static;height:auto;flex-direction:row;flex-wrap:wrap;align-items:center;gap:4px;padding:12px 14px;}
    .brand{padding:0 12px 0 4px;} .brand-sub{display:none;}
    .nav-label,.side-foot{display:none;}

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";
  var STATUSES=["대기","진행중","보류","완료"];
  var STATUS_HEX={"대기":"#94A3B8","진행중":"#2563EB","보류":"#D97706","완료":"#16A34A"};
  var PROJ_STATUSES=["진행중","보류","완료"];
  var PSTAT_BG={"진행중":"#DBEAFE","보류":"#FEF3C7","완료":"#DCFCE7"};
  var PSTAT_FG={"진행중":"#1D4ED8","보류":"#B45309","완료":"#15803D"};
  var PRIORITIES=["높음","보통","낮음"];
  var PRI_BG={"높음":"#FEE2E2","보통":"#FEF3C7","낮음":"#EEF1F5"};
  var PRI_FG={"높음":"#DC2626","보통":"#B45309","낮음":"#64748B"};
  var AVATAR_COLORS=["#4338CA","#0EA5E9","#10B981","#F59E0B","#EC4899","#8B5CF6","#EF4444","#14B8A6","#6366F1","#F97316"];
  var PROJECT_COLORS=["#4338CA","#0EA5E9","#10B981","#F59E0B","#EC4899","#8B5CF6","#EF4444","#14B8A6"];
  var STORE_KEY="silbat-board-v3";

  function loadData(){return new Promise(function(res){
    try{var r=localStorage.getItem(STORE_KEY);res(r?JSON.parse(r):null);}catch(e){res(null);}
  });}
  function saveData(d){
    try{localStorage.setItem(STORE_KEY,JSON.stringify(d));}catch(e){console.error(e);toast("저장에 실패했어요.");}
    return Promise.resolve();
  }

  var state={members:[],projects:[],tasks:[],sheet:{columns:[],rows:[]}};
  var filter={member:"all",priority:"all",project:"all"};
  var editingTaskId=null, editingProjId=null, currentProjId=null;
  var draftStatus="대기", draftPriority="보통", draftProjStatus="진행중", draftColor=PROJECT_COLORS[0];
  var draftAssignees=[];

  function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
  function $(id){return document.getElementById(id);}
  function esc(s){return (s||"").replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
  function initials(n){n=(n||"").trim();return n?n.slice(0,2):"?";}
  function memberById(id){for(var i=0;i<state.members.length;i++)if(state.members[i].id===id)return state.members[i];return null;}
  function memberColor(id){var m=memberById(id);return m&&m.color?m.color:"#CBD2DC";}
  function projectById(id){for(var i=0;i<state.projects.length;i++)if(state.projects[i].id===id)return state.projects[i];return null;}
  function taskById(id){for(var i=0;i<state.tasks.length;i++)if(state.tasks[i].id===id)return state.tasks[i];return null;}
  function pad(n){return (n<10?"0":"")+n;}
  function todayStr(){var d=new Date();return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
  function offset(n){var d=new Date();d.setDate(d.getDate()+n);return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
  function daysUntil(due){if(!due)return null;var a=new Date(todayStr()+"T00:00:00"),b=new Date(due+"T00:00:00");return Math.round((b-a)/86400000);}
  function fmtDate(due){var p=due.split("-");return p[1]+"."+p[2];}
  function dueLabel(due){var d=daysUntil(due);if(d===null)return{txt:"",cls:""};
    if(d<0)return{txt:(-d)+"일 지남",cls:"over"};if(d===0)return{txt:"오늘 마감",cls:"soon"};
    if(d===1)return{txt:"내일 마감",cls:"soon"};if(d<=3)return{txt:d+"일 남음",cls:"soon"};return{txt:fmtDate(due),cls:""};}

  function defaultSheet(){
    var cN="col_"+uid(),cC="col_"+uid(),cD="col_"+uid(),cR="col_"+uid(),cM="col_"+uid();
    var cols=[{id:cN,label:"팀원"},{id:cC,label:"맡은 채널"},{id:cD,label:"맡은 업무"},{id:cR,label:"정기 업무"},{id:cM,label:"메모"}];
    function row(a,b,c,d,e){var x={};x[cN]=a;x[cC]=b;x[cD]=c;x[cR]=d;x[cM]=e;return {id:uid(),cells:x};}
    return {columns:cols,rows:[
      row("김지원","인스타그램, 네이버 블로그","콘텐츠 기획·카피라이팅","매주 월요일 콘텐츠 캘린더 작성",""),
      row("이서연","유튜브, 인스타 릴스","영상·썸네일 디자인","매월 말 다음 달 썸네일 일괄 제작",""),
      row("박준호","–","내부 시스템 운영","매일 오전 서버 점검","")
    ]};
  }
  function migrateSheet(roster){
    var cN="col_"+uid(),cC="col_"+uid(),cD="col_"+uid(),cR="col_"+uid(),cM="col_"+uid();
    var cols=[{id:cN,label:"팀원"},{id:cC,label:"맡은 채널"},{id:cD,label:"맡은 업무"},{id:cR,label:"정기 업무"},{id:cM,label:"메모"}];
    var rows=(roster||[]).map(function(r){var c={};c[cN]=r.name||"";c[cC]=r.channel||"";c[cD]=r.duty||"";c[cR]=r.regular||"";c[cM]=r.note||"";return {id:r.id||uid(),cells:c};});
    return {columns:cols,rows:rows};
  }

  function seed(){
    var m1=uid(),m2=uid(),m3=uid(),p1=uid(),p2=uid(),p3=uid();
    return {
      members:[{id:m1,name:"김지원",role:"기획 파트",color:AVATAR_COLORS[0]},{id:m2,name:"이서연",role:"디자인 파트",color:AVATAR_COLORS[1]},{id:m3,name:"박준호",role:"개발 파트",color:AVATAR_COLORS[2]}],
      projects:[
        {id:p1,name:"2분기 신제품 런칭",desc:"신제품 출시까지 기획·개발·마케팅 통합 관리",memo:"런칭일 6/30 고정! 임원 보고 자료 먼저.",status:"진행중",due:offset(20),color:"#4338CA",createdAt:Date.now()},
        {id:p2,name:"브랜드 리뉴얼",desc:"로고·컬러·상세페이지 리뉴얼",memo:"외주 디자이너 컨펌 대기 중",status:"진행중",due:offset(35),color:"#EC4899",createdAt:Date.now()},
        {id:p3,name:"내부 시스템 개선",desc:"대시보드 안정화 및 운영 효율화",memo:"",status:"진행중",due:offset(10),color:"#14B8A6",createdAt:Date.now()}
      ],
      tasks:[
        {id:uid(),title:"2분기 사업 계획안 초안 작성",assignees:[m1,m3],projectId:p1,status:"진행중",priority:"높음",due:offset(2),desc:"임원 보고용 초안.",createdAt:Date.now()},
        {id:uid(),title:"경쟁사 리서치 정리",assignees:[m1],projectId:p1,status:"대기",priority:"낮음",due:offset(7),desc:"",createdAt:Date.now()},
        {id:uid(),title:"런칭 일정표 확정",assignees:[m3],projectId:p1,status:"완료",priority:"보통",due:offset(-2),desc:"",createdAt:Date.now()},
        {id:uid(),title:"신규 브랜드 로고 시안 3종",assignees:[m2],projectId:p2,status:"진행중",priority:"보통",due:offset(5),desc:"",createdAt:Date.now()},
        {id:uid(),title:"제품 상세페이지 디자인",assignees:[m2],projectId:p2,status:"보류",priority:"보통",due:"",desc:"기획 확정 대기.",createdAt:Date.now()},
        {id:uid(),title:"내부 대시보드 버그 수정",assignees:[m3],projectId:p3,status:"대기",priority:"높음",due:offset(-1),desc:"통계 미표시 이슈.",createdAt:Date.now()},
        {id:uid(),title:"서버 모니터링 알림 설정",assignees:[m3],projectId:p3,status:"진행중",priority:"보통",due:offset(4),desc:"",createdAt:Date.now()},
        {id:uid(),title:"3월 정산 자료 정리",assignees:[m1],projectId:"",status:"완료",priority:"보통",due:offset(-3),desc:"",createdAt:Date.now()}
      ],
      sheet:defaultSheet()
    };
  }

  // -------- Custom confirm --------
  var confirmResolver=null;
  function askConfirm(title,sub,okLabel){
    $("confirmTitle").textContent=title;
    var s=$("confirmSub");s.textContent=sub||"";s.style.display=sub?"block":"none";
    $("confirmOk").textContent=okLabel||"삭제";
    show("confirmOverlay");
    return new Promise(function(res){confirmResolver=res;});
  }
  function resolveConfirm(v){hide("confirmOverlay");var r=confirmResolver;confirmResolver=null;if(r)r(v);}

  // -------- Dashboard --------
  function renderDash(){
    var c={total:state.tasks.length,wait:0,prog:0,over:0};
    state.tasks.forEach(function(t){
      if(t.status==="대기")c.wait++;
      if(t.status==="진행중")c.prog++;
      if(t.status!=="완료"&&t.due){var d=daysUntil(t.due);if(d!==null&&d<0)c.over++;}
    });
    $("statGrid").innerHTML=
      stat(c.total,"전체 업무","var(--ink)")+stat(c.wait,"대기중 업무","var(--st-wait)")+
      stat(c.prog,"진행중 업무","var(--st-prog)")+stat(c.over,"지연 업무","var(--pri-high)");
    var pp=$("projProgress");
    if(state.projects.length===0){pp.innerHTML='<div class="empty-soft">프로젝트를 추가하면 진행률이 표시됩니다.</div>';}
    else{pp.innerHTML=state.projects.map(function(p){
      var ts=state.tasks.filter(function(t){return t.projectId===p.id;});
      var done=ts.filter(function(t){return t.status==="완료";}).length;
      var pct=ts.length?Math.round(done/ts.length*100):0;
      return '<div class="pp-row" data-openproj="'+p.id+'"><span class="pp-chip" style="background:'+p.color+'"></span>'+

    psel.value=t?(t.projectId||""):(presetProj||"");

    renderSeg("f-status",STATUSES,draftStatus,STATUS_HEX,function(v){draftStatus=v;});

  function openProject(projId){
    editingProjId=projId||null;
    var p=projId?projectById(projId):null;
    $("projModalTitle").textContent=p?"프로젝트 편집":"프로젝트 추가";
    $("projDeleteBtn").style.display=p?"block":"none";
    $("p-name").value=p?p.name:"";
    $("p-desc").value=p?(p.desc||""):"";
    $("p-memo").value=p?(p.memo||""):"";
    $("p-due").value=p?(p.due||""):"";
    draftProjStatus=p?p.status:"진행중";
    draftColor=p?p.color:PROJECT_COLORS[state.projects.length%PROJECT_COLORS.length];
    renderSeg("p-status",PROJ_STATUSES,draftProjStatus,PSTAT_FG,function(v){draftProjStatus=v;});
    renderSwatches();
    show("projOverlay");setTimeout(function(){$("p-name").focus();},60);
  }
  function renderSwatches(){
    $("p-colors").innerHTML=PROJECT_COLORS.map(function(c){return '<button type="button" class="swatch'+(c===draftColor?" on":"")+'" data-color="'+c+'" style="background:'+c+'"></button>';}).join("");
    $("p-colors").querySelectorAll(".swatch").forEach(function(s){s.onclick=function(){draftColor=s.dataset.color;renderSwatches();};});
  }
  function saveProject(){
    var name=$("p-name").value.trim();
    if(!name){toast("프로젝트명을 입력해 주세요.");$("p-name").focus();return;}
    var payload={name:name,desc:$("p-desc").value.trim(),memo:$("p-memo").value.trim(),due:$("p-due").value||"",status:draftProjStatus,color:draftColor};
    if(editingProjId){state.projects=state.projects.map(function(p){return p.id===editingProjId?Object.assign({},p,payload):p;});toast("프로젝트를 수정했어요.");}
    else{payload.id=uid();payload.createdAt=Date.now();state.projects.push(payload);toast("프로젝트를 추가했어요.");}
    saveData(state);renderAll();hide("projOverlay");
  }
  function deleteProjectById(id){
    var p=projectById(id);if(!p)return;
    var n=state.tasks.filter(function(t){return t.projectId===id;}).length;
    askConfirm("‘"+p.name+"’ 프로젝트를 삭제할까요?",n>0?("이 프로젝트에 속한 업무 "+n+"건도 함께 삭제됩니다."):"되돌릴 수 없습니다.","삭제").then(function(ok){
      if(!ok)return;
      state.projects=state.projects.filter(function(x){return x.id!==id;});
      state.tasks=state.tasks.filter(function(t){return t.projectId!==id;});
      saveData(state);
      if(editingProjId===id)hide("projOverlay");
      if(currentProjId===id)switchView("projects");
      renderAll();toast("프로젝트와 관련 업무를 삭제했어요.");
    });
  }
  function setProjectMemo(id,val){state.projects=state.projects.map(function(p){return p.id===id?Object.assign({},p,{memo:val}):p;});}

  // -------- Members (dashboard) --------
  function addMember(){
    var id=uid();
    state.members.push({id:id,name:"",role:"",color:AVATAR_COLORS[state.members.length%AVATAR_COLORS.length]});
    saveData(state);renderMemberManage();
    var el=document.querySelector('.mm-name[data-mid="'+id+'"]');if(el)el.focus();
  }
  function setMemberField(id,field,val){
    state.members=state.members.map(function(m){return m.id===id?Object.assign({},m,(field==="name"?{name:val}:{role:val})):m;});
    saveData(state);renderFilters();renderBoard();renderProjects();
  }
  function moveMember(id,dir){
    var idx=-1;for(var i=0;i<state.members.length;i++)if(state.members[i].id===id)idx=i;
    if(idx<0)return;var ni=idx+dir;if(ni<0||ni>=state.members.length)return;
    var arr=state.members.slice();var tmp=arr[idx];arr[idx]=arr[ni];arr[ni]=tmp;state.members=arr;
    saveData(state);renderMemberManage();renderFilters();renderBoard();renderProjects();
  }
  function deleteMember(id){
    var m=memberById(id);if(!m)return;
    var n=state.tasks.filter(function(t){return (t.assignees||[]).indexOf(id)>=0;}).length;
    askConfirm((m.name||"이 담당자")+"를 삭제할까요?",n>0?("배정된 업무 "+n+"건에서 담당자만 제외됩니다."):"","삭제").then(function(ok){
      if(!ok)return;
      state.members=state.members.filter(function(x){return x.id!==id;});
      state.tasks=state.tasks.map(function(t){if((t.assignees||[]).indexOf(id)>=0){return Object.assign({},t,{assignees:t.assignees.filter(function(a){return a!==id;})});}return t;});
      saveData(state);renderMemberManage();renderFilters();renderBoard();renderProjects();renderDash();toast("담당자를 삭제했어요.");
    });
  }

  // -------- Drag & drop --------
  var dragId=null;
  function bindDnD(container){
    container.addEventListener("dragstart",function(e){var c=e.target.closest(".card");if(!c)return;dragId=c.dataset.id;c.classList.add("dragging");});
    container.addEventListener("dragend",function(e){var c=e.target.closest(".card");if(c)c.classList.remove("dragging");document.querySelectorAll(".col.dragover").forEach(function(x){x.classList.remove("dragover");});dragId=null;});
    container.addEventListener("dragover",function(e){var col=e.target.closest(".col");if(!col)return;e.preventDefault();document.querySelectorAll(".col.dragover").forEach(function(x){if(x!==col)x.classList.remove("dragover");});col.classList.add("dragover");});
    container.addEventListener("drop",function(e){var col=e.target.closest(".col");if(!col||!dragId)return;e.preventDefault();var ns=col.dataset.status;state.tasks=state.tasks.map(function(t){return t.id===dragId?Object.assign({},t,{status:ns}):t;});saveData(state);renderAll();});
  }

  function show(id){$(id).classList.add("show");}
  function hide(id){$(id).classList.remove("show");}
  var toastTimer=null;
  function toast(msg){var el=$("toast");el.textContent=msg;el.classList.add("show");clearTimeout(toastTimer);toastTimer=setTimeout(function(){el.classList.remove("show");},2200);}
  function cleanText(s){return (s||"").replace(/\u00a0/g," ").replace(/\n{3,}/g,"\n\n").replace(/\s+$/,"");}

  function bindEvents(){
    document.querySelectorAll(".nav-btn").forEach(function(b){b.addEventListener("click",function(){switchView(b.dataset.view);});});
    $("addSheetRow").onclick=addSheetRow;
    $("addSheetCol").onclick=addSheetColumn;
    $("addMemberBtn").onclick=addMember;

    document.body.addEventListener("click",function(e){
      if(e.target.closest(".postit"))return;
      var editp=e.target.closest("[data-editproj]");if(editp){openProject(editp.dataset.editproj);return;}
      var delp=e.target.closest("[data-delproj]");if(delp){deleteProjectById(delp.dataset.delproj);return;}
      var delt=e.target.closest("[data-deltask]");if(delt){deleteTaskById(delt.dataset.deltask);return;}
      var delcol=e.target.closest("[data-delcol]");if(delcol){deleteColumn(delcol.dataset.delcol);return;}
      var delrow=e.target.closest("[data-delrow]");if(delrow){deleteSheetRow(delrow.dataset.delrow);return;}
      var mup=e.target.closest("[data-moveup]");if(mup){moveMember(mup.dataset.moveup,-1);return;}
      var mdn=e.target.closest("[data-movedown]");if(mdn){moveMember(mdn.dataset.movedown,1);return;}
      var dmb=e.target.closest("[data-delmemb]");if(dmb){deleteMember(dmb.dataset.delmemb);return;}
      var ap=e.target.closest("[data-apick]");if(ap){toggleAssignee(ap.dataset.apick);return;}
      if(e.target.closest(".hcell"))return;
      if(e.target.closest(".rcell"))return;
      if(e.target.closest(".mm-name")||e.target.closest(".mm-role"))return;
      var close=e.target.closest("[data-close]");if(close){var ov=close.closest(".overlay");if(ov)ov.classList.remove("show");return;}
      var op=e.target.closest("[data-openproj]");if(op){openProjectDetail(op.dataset.openproj);return;}
      var ot=e.target.closest("[data-opentask]");if(ot){openTask(ot.dataset.opentask);return;}
      var card=e.target.closest(".card");if(card){openTask(card.dataset.id);return;}
      var addto=e.target.closest("[data-addto]");if(addto){openTask(null,addto.dataset.addto,addto.dataset.addproj||"");return;}
      var ch=e.target.closest("[data-filter]");if(ch){filter[ch.dataset.filter]=ch.dataset.val;renderFilters();renderBoard();return;}
      if(e.target.closest("#addProjTile")){openProject(null);return;}
    });

    document.body.addEventListener("input",function(e){var pi=e.target.closest(".postit");if(pi){setProjectMemo(pi.dataset.memo,pi.value);}});
    document.body.addEventListener("focusout",function(e){
      var pi=e.target.closest(".postit");
      if(pi){setProjectMemo(pi.dataset.memo,pi.value);saveData(state);return;}
      var hc=e.target.closest(".hcell");
      if(hc){var lab=cleanText(hc.innerText);if(hc.innerText.replace(/\s+/g,"")===""){hc.innerHTML="";lab="";}setColLabel(hc.dataset.col,lab);return;}
      var rc=e.target.closest(".rcell");
      if(rc){var txt=cleanText(rc.innerText);if(rc.innerText.replace(/\s+/g,"")===""){rc.innerHTML="";txt="";}setCell(rc.dataset.row,rc.dataset.col,txt);return;}
      var mc=e.target.closest(".mm-name, .mm-role");
      if(mc){var mt=cleanText(mc.innerText);if(mc.innerText.replace(/\s+/g,"")===""){mc.innerHTML="";mt="";}setMemberField(mc.dataset.mid,mc.dataset.mfield,mt);return;}
    });
    document.body.addEventListener("paste",function(e){
      var ed=e.target.closest(".rcell, .hcell, .mm-name, .mm-role");if(!ed)return;
      e.preventDefault();var text=((e.clipboardData||window.clipboardData).getData("text")||"");
      if(document.execCommand){document.execCommand("insertText",false,text);}
    });

    // confirm modal
    $("confirmOk").onclick=function(){resolveConfirm(true);};
    $("confirmCancel").onclick=function(){resolveConfirm(false);};
    $("confirmOverlay").addEventListener("click",function(e){if(e.target===$("confirmOverlay"))resolveConfirm(false);});

    $("taskSaveBtn").onclick=saveTask;$("taskDeleteBtn").onclick=function(){deleteTaskById(editingTaskId);};
    $("projSaveBtn").onclick=saveProject;$("projDeleteBtn").onclick=function(){deleteProjectById(editingProjId);};
    $("p-name").addEventListener("keydown",function(e){if(e.key==="Enter")saveProject();});
    document.addEventListener("keydown",function(e){
      if(e.key!=="Escape")return;
      if($("confirmOverlay").classList.contains("show")){resolveConfirm(false);return;}
      document.querySelectorAll(".overlay.show").forEach(function(o){o.classList.remove("show");});
    });
    $("resetBtn").onclick=function(){askConfirm("모든 데이터를 초기화할까요?","모든 프로젝트·업무·표·담당자가 지워지고 예시 상태로 돌아갑니다.","초기화").then(function(ok){if(!ok)return;state=seed();currentProjId=null;saveData(state);switchView("dash");renderAll();toast("초기화했어요.");});};
    $("logoutBtn").onclick=function(){localStorage.removeItem(LOGIN_KEY);location.reload();};
    bindDnD($("board"));
    bindDnD($("view-projectDetail"));
  }

  var LOGIN_KEY="bfs-auth";
  var LOGIN_PW="ajflzkfkr1!";

  function startApp(){
    loadData().then(function(d){
      if(d&&d.members){
        state=d;state.projects=state.projects||[];state.tasks=state.tasks||[];state.members=state.members||[];
        state.members.forEach(function(m,i){if(!m.color)m.color=AVATAR_COLORS[i%AVATAR_COLORS.length];});
        state.tasks=state.tasks.map(function(t){if(!t.assignees){t.assignees=t.assignee?[t.assignee]:[];}if(t.assignee!==undefined)delete t.assignee;return t;});
        if(!state.sheet||!state.sheet.columns){state.sheet=migrateSheet(state.roster);}
        if(state.roster)delete state.roster;
        saveData(state);
      } else {state=seed();saveData(state);}
      bindEvents();renderAll();$("loading").style.display="none";
    }).catch(function(err){console.error(err);state=seed();bindEvents();renderAll();$("loading").style.display="none";toast("저장소를 불러오지 못해 임시 모드로 시작합니다.");});
  }

  if(localStorage.getItem(LOGIN_KEY)==="1"){
    $("loginOverlay").style.display="none";
    startApp();
  } else {
    var _lpw=$("loginPw"),_lbtn=$("loginBtn"),_lerr=$("loginErr");
    _lbtn.onclick=function(){
      if(_lpw.value===LOGIN_PW){
        localStorage.setItem(LOGIN_KEY,"1");
        $("loginOverlay").style.display="none";
        startApp();
      } else {_lerr.textContent="비밀번호가 올바르지 않습니다.";_lpw.value="";_lpw.focus();}
    };
    _lpw.addEventListener("keydown",function(e){if(e.key==="Enter")_lbtn.onclick();});
    _lpw.focus();
  }
})();
</script>
</body>
</html>
